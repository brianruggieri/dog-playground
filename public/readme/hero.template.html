<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>{{title}}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Baloo+2:wght@700&display=swap');
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
}
.hero {
  position: relative;
  width: {{width}}px;
  height: {{height}}px;
  border-radius: 36px;
  overflow: hidden;
  background: radial-gradient(circle at 12% 20%, #2f885f 0%, #0f3f2c 55%, #0a2b1f 100%);
}
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url('{{backgroundUrl}}');
  background-size: 180px 180px;
  opacity: 0.32;
  filter: saturate(1.2) contrast(1.1);
}
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, rgba(10, 24, 18, 0.68) 0%, rgba(10, 24, 18, 0.35) 40%, rgba(255, 255, 255, 0) 72%);
}
.title {
  position: absolute;
  left: 110px;
  top: 130px;
  font-family: 'Fredoka One', 'Baloo 2', cursive;
  font-size: 106px;
  letter-spacing: 2px;
  color: #fff7e6;
  text-shadow: 0 6px 0 rgba(11, 35, 24, 0.7), 0 18px 40px rgba(0, 0, 0, 0.35);
  z-index: 3;
}
.subtitle {
  position: absolute;
  left: 120px;
  top: 290px;
  max-width: 560px;
  font-family: 'Baloo 2', cursive;
  font-size: 28px;
  line-height: 1.3;
  color: #f6e7c8;
  opacity: 0.92;
  z-index: 3;
}
.badge {
  position: absolute;
  left: 120px;
  top: 372px;
  padding: 10px 20px;
  border-radius: 999px;
  background: rgba(255, 216, 132, 0.14);
  border: 2px solid rgba(255, 216, 132, 0.5);
  color: #ffe7b3;
  font-family: 'Baloo 2', cursive;
  font-size: 19px;
  letter-spacing: 1px;
  z-index: 3;
}
.dog-glow {
  position: absolute;
  right: 120px;
  bottom: 40px;
  width: 520px;
  height: 300px;
  background: radial-gradient(circle, rgba(255, 234, 185, 0.38) 0%, rgba(255, 234, 185, 0) 70%);
  z-index: 1;
}
.dog {
  position: absolute;
  right: 260px;
  bottom: 88px;
  width: 360px;
  transform: rotate(-6deg);
  filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.35));
  z-index: 3;
}
.toy {
  position: absolute;
  right: 150px;
  top: 140px;
  width: 170px;
  transform: rotate(-18deg);
  filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.35));
  z-index: 3;
}
.throw-line {
  position: absolute;
  right: 120px;
  top: 160px;
  width: 520px;
  height: 260px;
  z-index: 2;
}
.throw-line path {
  stroke: rgba(255, 255, 255, 0.85);
  stroke-width: 6;
  stroke-dasharray: 10 12;
  fill: none;
  filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.35));
}
</style>
</head>
<body>
  <div class="hero">
    <div class="title">{{title}}</div>
    <div class="subtitle">{{subtitle}}</div>
    <div class="badge">{{badge}}</div>
    <div class="dog-glow"></div>
    <svg class="throw-line" viewBox="0 0 520 260" preserveAspectRatio="none">
      <path d="M20 240 C 160 120, 320 60, 500 80" />
    </svg>
    <img class="toy" src="{{toyUrl}}" alt="toy" />
    <img class="dog" src="{{dogUrl}}" alt="dog" />
  </div>
</body>
</html>
